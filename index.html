<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SalamatDoc Hospital Management System</title>
  
  <!-- External Links -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Open+Sans&family=Poppins:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- styles.css (empty but included for future use) -->
  <link rel="stylesheet" href="styles.css">

  <style>
    /* ==================== GLOBAL STYLES ==================== */
    body {
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      background: linear-gradient(to right, #dabfd4, #7c5c6f);
      height: 100vh;
      overflow: hidden;
    }

    .page {
      display: none;
      height: 100vh;
      overflow-y: auto;
    }

    .page.active {
      display: block;
    }

    /* You can put common styles here if needed */
  </style>
</head>
<body>

  <!-- ==================== LOGIN PAGE ==================== -->
  <div id="login-page" class="page active">
    <div class="login-container">
      <h2>Login</h2>
      <div class="role-container">
        <button type="button" onclick="selectRole(this, 'Doctor')">Doctor</button>
        <button type="button" onclick="selectRole(this, 'Patients')">Patients</button>
        <button type="button" onclick="selectRole(this, 'Nurse')">Nurse</button>
        <button type="button" onclick="selectRole(this, 'Admin')">Admin</button>
      </div>   
      <form id="loginForm">
        <label for="username">Username:</label>
        <input type="text" id="username" required>
        <label for="password">Password:</label>
        <input type="password" id="password" required>
        <button type="submit">Login</button>
      </form>
      <div class="extra-links">
        <a href="#" onclick="showPage('signup-page')">Sign Up</a>
        <a href="#" onclick="showPage('forgot-page')">Forgot Password?</a>
      </div>
    </div>
  </div>

  <!-- ==================== SIGNUP PAGE ==================== -->
  <div id="signup-page" class="page">
    <!-- Paste full content of signup.html here (same as original) -->
    <div class="login-container">
      <h2>Sign Up</h2>
      <div class="role-container">
        <button type="button" onclick="selectRole(this, 'Doctor')">Doctor</button>
        <button type="button" onclick="selectRole(this, 'Patients')">Patients</button>
        <button type="button" onclick="selectRole(this, 'Nurse')">Nurse</button>
        <button type="button" onclick="selectRole(this, 'Admin')">Admin</button>
      </div>   
      <form id="signupForm">
        <label for="username">Username:</label>
        <input type="text" id="username" required>
        <label for="password">Password:</label>
        <input type="password" id="password" required>
        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" required>
        <button type="submit">Sign Up</button>
      </form>
    </div>
  </div>

  <!-- ==================== FORGOT PASSWORD PAGE ==================== -->
  <div id="forgot-page" class="page">
    <div class="forgot-container">
      <h2>Forgot Password</h2>
      <form id="forgotForm">
        <label for="email">Enter your email address:</label>
        <input type="email" id="email" required>
        <button type="submit">Reset Password</button>
      </form>
      <a href="#" onclick="showPage('login-page')" class="back-link">Back to Login</a>
    </div>
  </div>

  <!-- ==================== ADMIN DASHBOARD ==================== -->
  <div id="admin-dashboard" class="page">
    <!-- Full admindashboard.html content would go here -->
    <iframe srcdoc='<!-- Paste full admindashboard.html body content -->' style="width:100%; height:100%; border:none;"></iframe>
  </div>

  <!-- ==================== DOCTOR DASHBOARD ==================== -->
  <div id="doctor-dashboard" class="page">
    <!-- doctordashboard.html content -->
  </div>

  <!-- Add other pages similarly: bed-appointment, consultation, emergency-queue, medicalrecords, medicine, mypatients, patient-registration, profilemanagement -->

  <script>
    // Role selection (shared)
    let selectedRole = "";
    function selectRole(button, role) {
      selectedRole = role;
      document.querySelectorAll('.role-container button').forEach(btn => {
        btn.classList.remove('active');
      });
      button.classList.add('active');
    }

    // Page Navigation
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      const targetPage = document.getElementById(pageId);
      if (targetPage) targetPage.classList.add('active');
    }

    // Login & Signup Form Handling
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      if (!selectedRole) {
        alert("Please select a role before logging in.");
        return;
      }
      if (selectedRole === "Admin") showPage('admin-dashboard');
      else if (selectedRole === "Doctor") showPage('doctor-dashboard');
      else if (selectedRole === "Nurse") showPage('admin-dashboard');
      else if (selectedRole === "Patients") alert("Patients dashboard not yet implemented.");
    });

    document.getElementById("signupForm").addEventListener("submit", function(e) {
      e.preventDefault();
      if (!selectedRole) {
        alert("Please select a role before signing up.");
        return;
      }
      // Same navigation as login
      if (selectedRole === "Admin") showPage('admin-dashboard');
      else if (selectedRole === "Doctor") showPage('doctor-dashboard');
      else if (selectedRole === "Nurse") showPage('admin-dashboard');
      else if (selectedRole === "Patients") alert("Patients dashboard not yet implemented.");
    });

    // Forgot password form
    document.getElementById("forgotForm").addEventListener("submit", function(e) {
      e.preventDefault();
      alert("Password reset link has been sent to your email!");
      showPage('login-page');
    });
  </script>
</body>
</html>
